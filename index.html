<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>دعوتك</title>
  <style>
    body {
      background: white;
      font-family: sans-serif;
      text-align: center;
      padding: 40px;
    }
    .box {
      max-width: 350px;
      margin: auto;
      padding: 25px;
      border: 1px solid #ddd;
      border-radius: 15px;
    }
    input {
      width: 90%;
      padding: 12px;
      font-size: 18px;
      margin: 15px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      text-align: center;
    }
    button {
      padding: 12px 25px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 10px;
      border: none;
      background: black;
      color: white;
    }
    img {
      width: 220px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h2>أهلاً بكِ 🤍</h2>
  <p>الرجاء كتابة اسمك لعرض باركود الدعوة</p>

  <div class="box">
    <input id="nameInput" type="text" placeholder="مثال: حنان">
    <button onclick="showQR()">عرض الباركود</button>

    <div id="result"></div>
  </div>

<script>
function showQR() {
  const name = document.getElementById("nameInput").value.trim();
  const result = document.getElementById("result");

  if (name === "حنان") {
    result.innerHTML = `
      <p>مرحباً حنان 🌸</p>
      <img src="PUT_HANAN_QR_HERE">
    `;
  } else if (name === "ليلى") {
    result.innerHTML = `
      <p>مرحباً ليلى 🌸</p>
      <img src="PUT_LAILA_QR_HERE">
    `;
  } else {
    result.innerHTML = `
      <p style="color:red;">الاسم غير موجود.. اكتبِه نفس ماهو مكتوب.</p>
    `;
  }
}
</script>

</body>
</html>
